<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EFG Dual Clock - Local & GMT</title>
    <style>
        body {
            background-color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #00FF00;
            font-family: 'Courier New', Courier, monospace;
        }

        .clock-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin-bottom: 20px;
        }

        /* Clock Face Image */
        .clock-face {
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            position: relative;
        }

        /* Tactical Hands */
        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            background: #444;
            border-radius: 4px;
            transition: transform 0.05s cubic-bezier(0.4, 2.3, 0.3, 1);
        }

        .hour-hand { width: 6px; height: 70px; margin-left: -3px; background: #666; }
        .min-hand { width: 4px; height: 100px; margin-left: -2px; background: #888; }
        .sec-hand { width: 2px; height: 110px; margin-left: -1px; background: #FF4500; }

        /* Digital Date Display */
        .date-box {
            background: rgba(0, 50, 0, 0.8);
            border: 2px solid #005500;
            padding: 5px 15px;
            font-weight: bold;
            letter-spacing: 5px;
            margin-top: -30px;
            margin-bottom: 30px;
            z-index: 10;
        }

        .label {
            font-size: 0.8rem;
            margin-top: -10px;
            margin-bottom: 10px;
            color: #FFD700;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="label">Local Time</div>
    <div class="clock-container">
        <div class="clock-face" id="face1" style="background-image: url('clean_dial.png');">
            <div id="local-hour" class="hand hour-hand"></div>
            <div id="local-min" class="hand min-hand"></div>
            <div id="local-sec" class="hand sec-hand"></div>
        </div>
    </div>
    <div id="local-date" class="date-box">SAT 28 MAR 2026</div>

    <div class="label">GMT (World Time)</div>
    <div class="clock-container">
        <div class="clock-face" id="face2" style="background-image: url('gmt.png');">
            <div id="gmt-hour" class="hand hour-hand"></div>
            <div id="gmt-min" class="hand min-hand"></div>
            <div id="gmt-sec" class="hand sec-hand"></div>
        </div>
    </div>
    <div id="gmt-date" class="date-box">SAT 28 MAR 2026</div>

    <script>
        function updateClocks() {
            const now = new Date();

            // 1. LOCAL TIME CALCULATION
            const lH = now.getHours();
            const lM = now.getMinutes();
            const lS = now.getSeconds();

            // 2. GMT TIME CALCULATION (UTC)
            const gH = now.getUTCHours();
            const gM = now.getUTCMinutes();
            const gS = now.getUTCSeconds();

            // Rotate Local Hands
            setRotation('local-hour', (lH % 12) * 30 + lM / 2);
            setRotation('local-min', lM * 6);
            setRotation('local-sec', lS * 6);

            // Rotate GMT Hands
            setRotation('gmt-hour', (gH % 12) * 30 + gM / 2);
            setRotation('gmt-min', gM * 6);
            setRotation('gmt-sec', gS * 6);

            // Update Dates
            updateDate('local-date', now, false);
            updateDate('gmt-date', now, true);
        }

        function setRotation(id, deg) {
            document.getElementById(id).style.transform = `rotate(${deg}deg)`;
        }

        function updateDate(id, dateObj, isGMT) {
            const days = ["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"];
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            
            let d, dd, mm, yyyy;
            if(isGMT) {
                d = days[dateObj.getUTCDay()];
                dd = dateObj.getUTCDate();
                mm = months[dateObj.getUTCMonth()];
                yyyy = dateObj.getUTCFullYear();
            } else {
                d = days[dateObj.getDay()];
                dd = dateObj.getDate();
                mm = months[dateObj.getMonth()];
                yyyy = dateObj.getFullYear();
            }
            
            document.getElementById(id).textContent = `${d} ${dd.toString().padStart(2, '0')} ${mm} ${yyyy}`;
        }

        setInterval(updateClocks, 1000);
        updateClocks(); // Initial call
    </script>
</body>
</html>
